name: Daily commitment scan

# Runs once a day at 09:00 UTC. The /api/cron/commitments endpoint:
#   - scans each connected user's sent mail since their last scan
#   - extracts new commitments via Claude (prefiltered for cost)
#   - auto-fulfills any open commitments that have a newer thread reply
#
# Makes Promises stay fresh without the user clicking "Scan now."

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: cron-commitments
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Ping commitments endpoint
        run: |
          response=$(curl -sS -L --location-trusted --max-redirs 3 -w "\nHTTP %{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: github-actions-cron" \
            "${{ vars.APP_URL }}/api/cron/commitments")
          echo "$response"
          status=$(echo "$response" | grep -oP 'HTTP \K\d+' | tail -1)
          if [ "$status" != "200" ]; then
            echo "::error::Commitment cron failed with HTTP $status"
            exit 1
          fi
