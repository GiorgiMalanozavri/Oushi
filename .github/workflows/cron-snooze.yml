name: Resurface snoozed emails

# Runs every 15 min. /api/cron/snooze-resurface finds emails whose
# snooze_until has passed, clears the snooze, and pushes a notification
# to the user.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: cron-snooze
  cancel-in-progress: false

jobs:
  resurface:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping snooze-resurface endpoint
        run: |
          response=$(curl -sS -L --location-trusted --max-redirs 3 -w "\nHTTP %{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: github-actions-cron" \
            "${{ vars.APP_URL }}/api/cron/snooze-resurface")
          echo "$response"
          status=$(echo "$response" | grep -oP 'HTTP \K\d+' | tail -1)
          if [ "$status" != "200" ]; then
            echo "::error::Snooze cron failed with HTTP $status"
            exit 1
          fi
