name: Push nudges

# Runs every hour. The /api/cron/nudges endpoint:
#   - finds overdue commitments for users with push subscriptions
#   - finds stale awaiting-reply emails (48h+, score >= 50)
#   - dedupes via push_nudges_sent so no nudge fires twice
#
# This is what makes Oushi actually reach OUT to the user instead of
# waiting for them to open the app.

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: push-nudges
  cancel-in-progress: false

jobs:
  fire-nudges:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping nudges endpoint
        run: |
          response=$(curl -sS -L --location-trusted --max-redirs 3 -w "\nHTTP %{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: github-actions-cron" \
            "${{ vars.APP_URL }}/api/cron/nudges")
          echo "$response"
          status=$(echo "$response" | grep -oP 'HTTP \K\d+' | tail -1)
          if [ "$status" != "200" ]; then
            echo "::error::Nudge cron failed with HTTP $status"
            exit 1
          fi
